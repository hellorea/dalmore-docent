<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>The Dalmore · Digital Docent</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&family=Noto+Serif+KR:wght@300;400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--black:#080604;--dark:#110e09;--panel:#1a1610;--card:#201c13;--gold:#c9a96e;--lgold:#dfc28f;--dgold:#8a6e3a;--cream:#f0e6d0;--muted:#8a7558;--dim:#4a3e2e}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--black);color:var(--cream);font-family:'Jost',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden}
.ko body,.ko .sec-title,.ko .hero-title,.ko .tl-title,.ko .fact-lbl,.ko .prod-name,.ko .ba-title,.ko .pair-name,.ko .foot-brand{font-family:'Noto Serif KR','Cormorant Garamond',serif}
.ko .sec-body,.ko .t-txt,.ko .tl-text,.ko .tasting-txt,.ko .pair-food,.ko .prod-meta,.ko .prod-badge,.ko .ba-desc,.ko .sec-label,.ko .t-lbl,.ko .f-key,.ko .c-tag,.ko .nav-btn,.ko .hero-label,.ko .hero-sub,.ko .hero-desc,.ko .hero-cta,.ko .foot-sub,.ko .scroll-hint span{font-family:'Noto Sans KR','Jost',sans-serif;font-weight:300}

/* LANG TOGGLE */
.lang-toggle{position:fixed;top:.85rem;right:1rem;z-index:200;display:flex;gap:0;border:.5px solid var(--dgold);border-radius:3px;overflow:hidden}
.lang-btn{padding:.3rem .6rem;font-size:.6rem;letter-spacing:.1em;color:var(--muted);background:rgba(10,8,5,.9);border:none;cursor:pointer;font-family:'Jost',sans-serif;transition:all .2s;backdrop-filter:blur(8px)}
.lang-btn.active{color:var(--black);background:var(--gold)}
.lang-btn:first-child{border-right:.5px solid var(--dgold)}

/* HERO */
.hero{position:relative;min-height:100svh;display:flex;flex-direction:column;justify-content:flex-end;padding:0 0 2.5rem;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 70% 30%,#1e1508 0%,var(--black) 70%)}
.hero-stag{position:absolute;top:3rem;right:1.5rem;width:42vw;max-width:200px;opacity:.15;pointer-events:none}
.hero-ring{position:absolute;top:2.5rem;right:1rem;width:48vw;max-width:220px;height:48vw;max-height:220px;border-radius:50%;border:.5px solid var(--dgold);opacity:.3}
.hero-ring2{position:absolute;top:calc(2.5rem + 3vw);right:calc(1rem + 3vw);width:42vw;max-width:194px;height:42vw;max-height:194px;border-radius:50%;border:.5px solid var(--gold);opacity:.18}
.hero-content{position:relative;padding:0 1.5rem}
.hero-label{font-size:.62rem;letter-spacing:.3em;color:var(--gold);margin-bottom:.5rem}
.hero-title{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(3rem,14vw,5rem);line-height:.95;color:var(--cream);margin-bottom:.6rem}
.hero-rule{width:2rem;height:1px;background:var(--gold);margin-bottom:.8rem}
.hero-sub{font-size:.65rem;letter-spacing:.2em;color:var(--muted);margin-bottom:.5rem}
.hero-desc{font-size:.78rem;color:var(--dim);line-height:1.7;margin-bottom:2rem}
.hero-cta{display:inline-flex;align-items:center;gap:.5rem;font-size:.65rem;letter-spacing:.15em;color:var(--gold);border:.5px solid var(--dgold);padding:.6rem 1.2rem;border-radius:2px;cursor:pointer;background:none;font-family:'Jost',sans-serif}
.scroll-hint{position:absolute;bottom:1.2rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.3rem;opacity:.35;animation:bob 2.2s ease-in-out infinite}
.scroll-hint span{font-size:.52rem;letter-spacing:.2em;color:var(--muted)}
.scroll-arrow{width:1px;height:20px;background:linear-gradient(var(--dgold),transparent)}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}55%{transform:translateX(-50%) translateY(5px)}}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(8,6,4,.93);backdrop-filter:blur(12px);border-bottom:.5px solid rgba(201,169,110,.12);display:flex;overflow-x:auto;scrollbar-width:none;padding:0 .4rem}
.nav::-webkit-scrollbar{display:none}
.nav-btn{flex-shrink:0;padding:.85rem .85rem;font-family:'Jost',sans-serif;font-size:.58rem;font-weight:400;letter-spacing:.2em;color:var(--muted);background:none;border:none;border-bottom:1.5px solid transparent;cursor:pointer;white-space:nowrap;transition:color .2s,border-color .2s}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

/* SECTIONS */
.section{display:none;animation:fadeIn .3s ease}
.section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.section-inner{padding:1.75rem 1.25rem 5rem}
.sec-label{font-size:.56rem;letter-spacing:.32em;color:var(--gold);margin-bottom:.4rem}
.sec-title{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(2rem,9vw,2.8rem);line-height:1.05;color:var(--cream);margin-bottom:.7rem}
.sec-rule{width:2rem;height:1px;background:var(--gold);margin-bottom:1rem}
.sec-body{font-size:.8rem;color:var(--muted);line-height:1.75;margin-bottom:1.5rem}

/* PRODUCT */
.prod-tabs{display:flex;gap:.35rem;overflow-x:auto;scrollbar-width:none;padding-bottom:.2rem;margin-bottom:1.2rem}
.prod-tabs::-webkit-scrollbar{display:none}
.prod-tab{flex-shrink:0;padding:.38rem .75rem;font-size:.55rem;letter-spacing:.12em;color:var(--muted);border:.5px solid var(--dim);border-radius:2px;cursor:pointer;background:none;transition:all .2s;font-family:'Jost',sans-serif}
.prod-tab.active{color:var(--gold);border-color:var(--gold);background:rgba(201,169,110,.05)}
.prod-card{background:var(--card);border:.5px solid var(--dim);border-radius:4px;overflow:hidden}
.prod-top{height:3px}
.prod-top.gold{background:var(--gold)}
.prod-top.silver{background:linear-gradient(90deg,var(--dgold),var(--lgold),var(--dgold))}
.prod-top.smoke{background:var(--muted)}
.prod-body{padding:1.2rem}
.prod-badge{display:inline-block;font-size:.52rem;letter-spacing:.12em;color:var(--dgold);border:.5px solid var(--dim);padding:.22rem .5rem;border-radius:2px;margin-bottom:.55rem}
.prod-name{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:1.65rem;line-height:1.1;color:var(--cream);margin-bottom:.3rem}
.prod-meta{font-size:.65rem;color:var(--dim);letter-spacing:.05em;margin-bottom:1rem;display:flex;flex-wrap:wrap;gap:.5rem .9rem}
.t-grid{display:grid;grid-template-columns:1fr;gap:.5rem;margin-bottom:1rem}
.t-box{background:var(--panel);border-radius:3px;padding:.75rem}
.t-lbl{font-size:.52rem;letter-spacing:.25em;color:var(--gold);margin-bottom:.3rem}
.t-txt{font-size:.76rem;color:var(--muted);line-height:1.65}
.f-wrap{margin-bottom:1rem}
.f-head{font-size:.52rem;letter-spacing:.22em;color:var(--dim);margin-bottom:.65rem}
.f-row{display:flex;align-items:center;gap:.55rem;margin-bottom:.5rem}
.f-key{font-size:.68rem;color:var(--muted);width:72px;flex-shrink:0}
.f-track{flex:1;height:2.5px;background:var(--panel);border-radius:2px;overflow:hidden}
.f-fill{height:100%;background:var(--gold);border-radius:2px;width:0;transition:width .85s cubic-bezier(.4,0,.2,1)}
.f-val{font-size:.58rem;color:var(--dim);width:22px;text-align:right}
.c-list{display:flex;flex-wrap:wrap;gap:.35rem}
.c-tag{font-size:.58rem;color:var(--muted);border:.5px solid var(--dim);border-radius:2px;padding:.2rem .5rem;background:var(--panel)}
.ba-card{background:var(--panel);border:.5px solid var(--dgold);border-radius:4px;padding:1.25rem;margin-top:2rem;text-align:center}
.ba-icon{width:2.5rem;height:2.5rem;border-radius:50%;background:var(--card);border:.5px solid var(--gold);display:flex;align-items:center;justify-content:center;margin:0 auto .7rem}
.ba-icon svg{width:1rem;height:1rem;stroke:var(--gold);fill:none}
.ba-title{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--cream);margin-bottom:.3rem}
.ba-desc{font-size:.7rem;color:var(--muted);line-height:1.65;margin-bottom:.9rem}
.ba-btn{display:inline-block;font-size:.62rem;letter-spacing:.18em;color:var(--black);background:var(--gold);padding:.62rem 1.4rem;border-radius:2px;border:none;cursor:pointer;font-family:'Jost',sans-serif;font-weight:400}

/* TIMELINE */
.timeline{position:relative;padding-left:1.4rem}
.timeline::before{content:'';position:absolute;left:.38rem;top:.5rem;bottom:.5rem;width:.5px;background:var(--dim)}
.tl-item{position:relative;margin-bottom:1.6rem}
.tl-dot{position:absolute;left:-1.15rem;top:.3rem;width:.52rem;height:.52rem;border-radius:50%;background:var(--gold);border:1.5px solid var(--black)}
.tl-year{font-size:.55rem;letter-spacing:.22em;color:var(--gold);margin-bottom:.2rem}
.tl-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--cream);margin-bottom:.35rem}
.tl-text{font-size:.76rem;color:var(--muted);line-height:1.7}

/* DISTILLERY */
.fact-grid{display:grid;grid-template-columns:1fr 1fr;gap:.55rem;margin-bottom:1.4rem}
.fact-card{background:var(--card);border:.5px solid var(--dim);border-radius:4px;padding:.9rem}
.fact-num{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:300;color:var(--gold);line-height:1}
.fact-lbl{font-size:.6rem;color:var(--muted);margin-top:.2rem}
.info-card{background:var(--card);border:.5px solid var(--dim);border-radius:4px;padding:1.1rem;margin-bottom:.7rem}

/* PAIRING */
.pair-item{border-left:1.5px solid var(--gold);padding:.55rem 0 .55rem .85rem;margin-bottom:1rem}
.pair-name{font-size:.7rem;font-weight:400;color:var(--cream);margin-bottom:.22rem;letter-spacing:.04em}
.pair-food{font-size:.74rem;color:var(--muted);line-height:1.6}

footer{text-align:center;padding:1.5rem 1.25rem 2.5rem;border-top:.5px solid var(--dim)}
.foot-brand{font-family:'Cormorant Garamond',serif;font-size:.95rem;color:var(--muted);letter-spacing:.18em;margin-bottom:.3rem}
.foot-sub{font-size:.56rem;color:var(--dim);letter-spacing:.08em;margin-top:.2rem}
</style>
</head>
<body>

<!-- LANG TOGGLE -->
<div class="lang-toggle">
  <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
  <button class="lang-btn" id="btn-ko" onclick="setLang('ko')">한국어</button>
</div>

<!-- HERO -->
<section class="hero" id="top">
  <div class="hero-bg"></div>
  <div class="hero-ring"></div><div class="hero-ring2"></div>
  <div class="hero-stag">
    <svg viewBox="0 0 160 210" fill="none">
      <path d="M80 175 L70 145 L48 132 L58 117 L53 96 L64 107 L68 90 L72 78 L76 65 L80 54 L84 65 L88 78 L92 90 L96 107 L107 96 L102 117 L112 132 L90 145 Z" fill="#c9a96e"/>
      <path d="M64 107 L48 98 L40 86 L53 92" fill="#c9a96e" opacity=".75"/>
      <path d="M96 107 L112 98 L120 86 L107 92" fill="#c9a96e" opacity=".75"/>
      <path d="M72 78 L60 70 L56 56 L68 68" fill="#c9a96e" opacity=".6"/>
      <path d="M88 78 L100 70 L104 56 L92 68" fill="#c9a96e" opacity=".6"/>
      <ellipse cx="72" cy="185" rx="5" ry="9" fill="#c9a96e" opacity=".55"/>
      <ellipse cx="88" cy="185" rx="5" ry="9" fill="#c9a96e" opacity=".55"/>
    </svg>
  </div>
  <div class="hero-content">
    <div class="hero-label" data-en="THE DALMORE · DIGITAL DOCENT" data-ko="더 달모어 · 디지털 도슨트"></div>
    <div class="hero-title" data-en="Highland<br>Single<br>Malt" data-ko="하이랜드<br>싱글<br>몰트"></div>
    <div class="hero-rule"></div>
    <div class="hero-sub" data-en="SCOTLAND · EST. 1839" data-ko="스코틀랜드 · 1839년 설립"></div>
    <div class="hero-desc" data-en="Incheon International Airport<br>Duty Free Collection" data-ko="인천국제공항<br>면세점 컬렉션"></div>
    <button class="hero-cta" onclick="document.getElementById('main-nav').scrollIntoView({behavior:'smooth'});setTimeout(()=>showSection('collection',null),400)" data-en="Explore Collection ↓" data-ko="컬렉션 살펴보기 ↓"></button>
  </div>
  <div class="scroll-hint"><div class="scroll-arrow"></div><span data-en="SCROLL" data-ko="스크롤"></span></div>
</section>

<!-- NAV -->
<nav class="nav" id="main-nav">
  <button class="nav-btn active" onclick="showSection('collection',this)" data-en="COLLECTION" data-ko="컬렉션"></button>
  <button class="nav-btn" onclick="showSection('heritage',this)" data-en="HERITAGE" data-ko="브랜드 스토리"></button>
  <button class="nav-btn" onclick="showSection('distillery',this)" data-en="DISTILLERY" data-ko="증류소"></button>
  <button class="nav-btn" onclick="showSection('pairing',this)" data-en="PAIRING" data-ko="페어링"></button>
</nav>

<!-- COLLECTION -->
<div id="section-collection" class="section active">
<div class="section-inner">
  <div class="sec-label" data-en="INCHEON DUTY FREE" data-ko="인천 면세점"></div>
  <div class="sec-title" data-en="Five<br>Expressions" data-ko="다섯 가지<br>익스프레션"></div>
  <div class="sec-rule"></div>
  <div class="sec-body" data-en="Each bottle a distinct chapter in The Dalmore's 180-year mastery of cask curation." data-ko="달모어 180년 캐스크 숙성 기술의 정수를 담은 다섯 가지 익스프레션입니다."></div>
  <div class="prod-tabs" id="prod-tabs">
    <button class="prod-tab active" onclick="showProduct(0)">ANTHOLOGY 13</button>
    <button class="prod-tab" onclick="showProduct(1)">ANTHOLOGY 16</button>
    <button class="prod-tab" onclick="showProduct(2)">ANTHOLOGY 19</button>
    <button class="prod-tab" onclick="showProduct(3)">KING ALEX III</button>
    <button class="prod-tab" onclick="showProduct(4)">CIGAR MALT</button>
  </div>
  <div id="prod-display"></div>
  <div class="ba-card">
    <div class="ba-icon"><svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
    <div class="ba-title" data-en="Speak with our Brand Ambassador" data-ko="브랜드 앰배서더에게 문의하기"></div>
    <div class="ba-desc" data-en="Our seasoned BA team is here to guide your selection and share the full story behind each expression." data-ko="숙련된 브랜드 앰배서더가 제품 선택을 도와드리고, 각 익스프레션에 담긴 이야기를 전해드립니다."></div>
    <button class="ba-btn" data-en="CALL A BA" data-ko="BA 호출하기"></button>
  </div>
</div>
</div>

<!-- HERITAGE -->
<div id="section-heritage" class="section">
<div class="section-inner">
  <div class="sec-label" data-en="THE STORY" data-ko="브랜드 히스토리"></div>
  <div class="sec-title" data-en="A Legacy<br>Born in 1263" data-ko="1263년에<br>시작된 유산"></div>
  <div class="sec-rule"></div>
  <div class="sec-body" data-en="Seven centuries of honour, craft and cask mastery — distilled into every bottle." data-ko="700년의 명예와 장인 정신, 캐스크 숙성의 기술이 모든 한 병에 담겨 있습니다."></div>
  <div class="timeline">
    <div class="tl-item">
      <div class="tl-dot"></div>
      <div class="tl-year">1263</div>
      <div class="tl-title" data-en="The Legend of the Stag" data-ko="수사슴의 전설"></div>
      <div class="tl-text" data-en="Colin Fitzgerald of Clan Mackenzie saved King Alexander III from a charging stag with a single arrow. The king granted the Mackenzies the right to bear the stag's head — the emblem on every bottle to this day." data-ko="맥켄지 가문의 콜린 피츠제럴드가 달려드는 수사슴으로부터 알렉산더 3세 왕을 화살 하나로 구했습니다. 왕은 맥켄지 가문에 수사슴 머리 문장을 사용할 권리를 하사했고, 이는 오늘날 모든 달모어 병에 새겨진 상징이 되었습니다."></div>
    </div>
    <div class="tl-item">
      <div class="tl-dot"></div>
      <div class="tl-year">1839</div>
      <div class="tl-title" data-en="Distillery Founded" data-ko="증류소 설립"></div>
      <div class="tl-text" data-en="Alexander Matheson established The Dalmore on the northern shores of the Cromarty Firth. Pure spring waters and cool Highland air became the foundation of its singular spirit character." data-ko="알렉산더 매터슨이 크로마티 만 북쪽 해안에 달모어 증류소를 설립했습니다. 맑은 샘물과 서늘한 하이랜드 공기가 달모어 특유의 풍미를 만들어내는 근간이 되었습니다."></div>
    </div>
    <div class="tl-item">
      <div class="tl-dot"></div>
      <div class="tl-year">1960s</div>
      <div class="tl-title" data-en="The Paterson Era" data-ko="패터슨 시대"></div>
      <div class="tl-text" data-en="Master Distiller Richard Paterson pioneered The Dalmore's rare cask finishing philosophy — forging relationships with the world's finest sherry bodegas, port houses and wineries." data-ko="마스터 디스틸러 리처드 패터슨이 달모어의 희귀 캐스크 피니싱 철학을 확립했습니다. 세계 최고의 셰리 보데가, 포트 하우스, 와이너리와의 파트너십을 구축했습니다."></div>
    </div>
    <div class="tl-item">
      <div class="tl-dot"></div>
      <div class="tl-year" data-en="TODAY" data-ko="현재"></div>
      <div class="tl-title" data-en="Global Travel Retail Icon" data-ko="글로벌 트래블 리테일 아이콘"></div>
      <div class="tl-text" data-en="The 3rd largest luxury malt brand in global travel retail. Exclusive collections crafted for the discerning international traveller — available here at Incheon International Airport." data-ko="글로벌 트래블 리테일 럭셔리 몰트 브랜드 3위. 안목 있는 국제 여행자를 위해 특별 제작된 익스클루시브 컬렉션이 인천국제공항 면세점에서 제공됩니다."></div>
    </div>
  </div>
</div>
</div>

<!-- DISTILLERY -->
<div id="section-distillery" class="section">
<div class="section-inner">
  <div class="sec-label" data-en="THE CRAFT" data-ko="장인 정신"></div>
  <div class="sec-title" data-en="Alness,<br>Scotland" data-ko="스코틀랜드<br>알네스"></div>
  <div class="sec-rule"></div>
  <div class="sec-body" data-en="Where the Cromarty Firth meets the Highland air — pure waters, deep history." data-ko="크로마티 만과 하이랜드의 바람이 만나는 곳 — 맑은 물과 깊은 역사가 살아 숨 쉽니다."></div>
  <div class="fact-grid">
    <div class="fact-card"><div class="fact-num">1839</div><div class="fact-lbl" data-en="Year founded" data-ko="설립 연도"></div></div>
    <div class="fact-card"><div class="fact-num">180+</div><div class="fact-lbl" data-en="Years of craft" data-ko="년의 장인 정신"></div></div>
    <div class="fact-card"><div class="fact-num">6</div><div class="fact-lbl" data-en="Casks — King Alexander III" data-ko="캐스크 — 킹 알렉산더 III"></div></div>
    <div class="fact-card"><div class="fact-num">#3</div><div class="fact-lbl" data-en="Luxury malt, global TR" data-ko="글로벌 TR 럭셔리 몰트"></div></div>
  </div>
  <div class="info-card">

let currentLang = 'en';
let currentProd = 0;

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-en').classList.toggle('active', lang==='en');
  document.getElementById('btn-ko').classList.toggle('active', lang==='ko');

  if(lang==='ko') document.documentElement.classList.add('ko');
  else document.documentElement.classList.remove('ko');

  // update all data-en / data-ko elements
  document.querySelectorAll('[data-en]').forEach(el => {
    const txt = el.getAttribute('data-'+lang);
    if(txt) el.innerHTML = txt;
  });

  // nav buttons text
  document.querySelectorAll('.nav-btn').forEach(btn => {
    const t = btn.getAttribute('data-'+lang);
    if(t) btn.textContent = t;
  });

  showProduct(currentProd);
}

function showProduct(i) {
  currentProd = i;
  document.querySelectorAll('.prod-tab').forEach((b,j)=>b.classList.toggle('active',j===i));
  const p = products[currentLang][i];
  const noseL  = currentLang==='ko'?'노즈':'NOSE';
  const palL   = currentLang==='ko'?'팔레트':'PALATE';
  const finL   = currentLang==='ko'?'피니시':'FINISH';
  document.getElementById('prod-display').innerHTML = `
<div class="prod-card">
  <div class="prod-top ${p.top}"></div>
  <div class="prod-body">
    <div class="prod-badge">${p.badge}</div>
    <div class="prod-name">${p.name}<br><span style="color:var(--gold)">${p.sub}</span></div>
    <div class="prod-meta">${p.meta.map(m=>`<span>${m}</span>`).join('')}</div>
    <div class="t-grid">
      <div class="t-box"><div class="t-lbl">${noseL}</div><div class="t-txt">${p.nose}</div></div>
      <div class="t-box"><div class="t-lbl">${palL}</div><div class="t-txt">${p.palate}</div></div>
      <div class="t-box"><div class="t-lbl">${finL}</div><div class="t-txt">${p.finish}</div></div>
    </div>
    <div class="f-wrap">
      <div class="f-head">${p.flavorHead}</div>
      ${p.flavors.map(f=>`<div class="f-row"><span class="f-key">${f.k}</span><div class="f-track"><div class="f-fill" data-v="${f.v}"></div></div><span class="f-val">${f.v}</span></div>`).join('')}
    </div>
    <div class="t-lbl" style="margin-bottom:.45rem">${p.caskHead}</div>
    <div class="c-list">${p.casks.map(c=>`<span class="c-tag">${c}</span>`).join('')}</div>
  </div>
</div>`;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    document.querySelectorAll('.f-fill').forEach(el=>el.style.width=el.dataset.v+'%');
  }));
}

function showSection(id, btn) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('section-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
  else {
    const navBtns = document.querySelectorAll('.nav-btn');
    const ids = ['collection','heritage','distillery','pairing'];
    const idx = ids.indexOf(id);
    if(idx>=0) navBtns[idx].classList.add('active');
  }
}
